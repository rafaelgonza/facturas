{% extends "base.html" %}
{% block title %}Acceso{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16 bg-white rounded-xl shadow-sm border border-slate-200 p-8">
  <h1 class="text-xl font-semibold text-slate-900 mb-2">Acceso</h1>
  <p class="text-sm text-slate-500 mb-6">Generador de facturas</p>

  {% if error %}
  <div class="mb-4 px-3 py-2 rounded bg-red-50 border border-red-200 text-red-700 text-sm">
    Contraseña incorrecta
  </div>
  {% endif %}

  <form method="post" action="/login" class="space-y-4">
    <div>
      <label class="block text-sm text-slate-600 mb-1">Contraseña</label>
      <input type="password" name="password" required autofocus
             class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-slate-400">
    </div>
    <button type="submit" class="w-full bg-slate-900 text-white py-2 rounded hover:bg-slate-800">
      Entrar
    </button>
  </form>
</div>
{% endblock %}
